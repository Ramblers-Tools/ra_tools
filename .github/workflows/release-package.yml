name: Build Joomla package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build package
        run: bash build-package.sh
      - name: Attach package to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
